# PDF-only auto trading + unlimited trades (user preference)

pairs:
  - EURUSD
  - GBPUSD
  - USDJPY
  - AUDUSD
  - USDCAD
  - XAUUSD

timeframe: "15m"
history_period: "5d"
htf_timeframe: null   # off while testing PDF-only
htf_period: "60d"

strategy:
  name: "multi_indicator"
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  ema_fast: 9
  ema_slow: 21
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  min_score: 1          # PDF path sets its own score
  atr_period: 14
  sl_atr_mult: 1.5
  tp_atr_mult: 2.5
  require_macd_momentum: false
  require_ema_macd_agree: false
  require_price_vs_ema_slow: false
  block_buy_if_rsi_overbought: false
  block_sell_if_rsi_oversold: false

risk:
  max_open_positions: 0     # 0 = unlimited
  risk_per_trade_pct: 1.0
  max_daily_loss_pct: 0     # 0 = off
  max_lot_size: null
  min_lot_size: 0.01
  fixed_lot_size: 0.01
  min_signal_score: 0       # allow PDF trades through broker

# Default; change anytime in Telegram: "interval 5" / "every 30 min"
scan_interval_minutes: 15
auto_trade_on_start: true
auto_trade_enabled: true
max_new_trades_per_cycle: 0  # 0 = unlimited per cycle

pdf:
  enabled: true
  mode: pdf_only            # trades ONLY from PDF ideas
  pdf_score: 2
  score_boost: 1
  use_pdf_levels: true
  allow_pdf_when_flat: true
  block_on_conflict: false
  include_pdf_pairs: true
  relax_min_score: true

quiet_hours:
  start_hour_utc: null
  end_hour_utc: null
