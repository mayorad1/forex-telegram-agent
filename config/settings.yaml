# Forex Telegram Agent — MT5 / Exness settings

pairs:
  - EURUSD
  - GBPUSD
  - USDJPY
  - AUDUSD
  - USDCAD
  - XAUUSD

# Signal timeframe (Yahoo for analysis; orders go to MT5)
timeframe: "15m"
history_period: "5d"

strategy:
  name: "multi_indicator"
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  ema_fast: 9
  ema_slow: 21
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  min_score: 2
  atr_period: 14
  sl_atr_mult: 1.5
  tp_atr_mult: 2.5

risk:
  # 0 = unlimited open positions
  max_open_positions: 0
  risk_per_trade_pct: 1.0
  # 0 = no daily loss lockout
  max_daily_loss_pct: 0
  # null / omit = no max lot cap (broker max only)
  max_lot_size: null
  min_lot_size: 0.01
  # Fixed lot for every trade (override % risk). Change in Telegram: "lot 0.05"
  # null = use % risk sizing instead
  fixed_lot_size: 0.01

# Auto trade every N minutes
scan_interval_minutes: 15
auto_trade_on_start: true
auto_trade_enabled: true
# 0 = unlimited new trades per 15m cycle (all actionable signals)
max_new_trades_per_cycle: 0

# PDF research / signal sheets
pdf:
  enabled: true
  mode: blend
  score_boost: 1
  use_pdf_levels: true
  allow_pdf_when_flat: true
  block_on_conflict: false
  include_pdf_pairs: true
  relax_min_score: false

quiet_hours:
  start_hour_utc: null
  end_hour_utc: null
